#cloud-config
# Paste this into DigitalOcean's User Data field (or any Ubuntu VPS startup script field).
# Single click: it installs Docker, adds swap (so the build won't OOM on <=1GB droplets),
# clones openslate, and starts the app on port 8080.
#
# After deploy, SSH into the server and edit /opt/openslate/.env to set:
#   DOMAIN=your-domain.com       # enables HTTPS via Caddy
#   R2_BUCKET=...                # enables media uploads
# Then run: cd /opt/openslate && docker compose up -d

package_update: true
package_upgrade: true
packages:
  - docker.io
  - docker-compose-v2
  - git

write_files:
  - path: /etc/docker/daemon.json
    content: |
      { "log-driver": "json-file", "log-opts": { "max-size": "10m", "max-file": "3" } }

runcmd:
  - systemctl enable --now docker
  # --- add swap so the build doesn't run out of memory on small (<=1GB) droplets ---
  - fallocate -l 3G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=3072
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - echo '/swapfile none swap sw 0 0' >> /etc/fstab
  # ---------------------------------------------------------------------------------
  - git clone https://github.com/MrSheerluck/openslate /opt/openslate
  - |
    sed "s/JWT_SECRET=.*/JWT_SECRET=$(openssl rand -hex 32)/" \
      /opt/openslate/.env.example > /opt/openslate/.env
  - cd /opt/openslate && docker compose up -d
