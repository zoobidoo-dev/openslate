services:
  - type: web
    name: openslate
    runtime: docker
    repo: https://github.com/MrSheerluck/openslate
    branch: main
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "8080"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
